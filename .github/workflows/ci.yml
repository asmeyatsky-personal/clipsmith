name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  architecture-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install import-linter
      run: pip install import-linter

    - name: Install backend deps (for graph analysis)
      working-directory: ./backend
      run: pip install -r requirements.txt

    - name: Run import-linter
      run: lint-imports --config backend/.importlinter

  backend-ci:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov

    - name: Run backend tests with coverage
      env:
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        JWT_SECRET_KEY: ci-test-secret-key-not-for-production
        DATABASE_URL: sqlite:///test.db
      run: |
        python -m pytest backend/tests -v --tb=short \
          --cov=backend \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-fail-under=60

    - name: Security dependency audit (blocking)
      working-directory: ./backend
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt --strict

    - name: Static security analysis (bandit)
      working-directory: ./backend
      run: |
        pip install bandit
        bandit -r . -ll -x ./tests,./venv,./test_env,./.venv

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run frontend lint
      working-directory: ./frontend
      run: npm run lint

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: Security dependency audit (blocking on high)
      working-directory: ./frontend
      run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    needs: [secrets-scan, architecture-lint, backend-ci, frontend-ci]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build backend Docker image
      run: docker build -f Dockerfile.backend -t clipsmith-backend:ci .

    - name: Build frontend Docker image
      run: docker build -f Dockerfile.frontend -t clipsmith-frontend:ci .
